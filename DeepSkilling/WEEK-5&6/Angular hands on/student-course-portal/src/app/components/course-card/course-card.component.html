<!-- HANDS-ON 3: ngClass (getter), ngStyle (dynamic border), ngSwitch (badge),
     appHighlight directive on the host, and the creditLabel custom pipe. -->
<div
  class="course-card"
  [ngClass]="cardClasses"
  [ngStyle]="{ 'border-left': '6px solid ' + borderColor }"
  appHighlight="lightyellow"
>
  <h3>{{ course.name }}</h3>
  <p class="code">{{ course.code }}</p>
  <p class="credits">{{ course.credits | creditLabel }}</p>

  <!-- *ngSwitch grade badge -->
  <span [ngSwitch]="course.gradeStatus" class="badge">
    <span *ngSwitchCase="'passed'" class="badge badge--passed">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge badge--failed">Failed</span>
    <span *ngSwitchDefault class="badge badge--pending">Pending</span>
  </span>

  <div *ngIf="isExpanded" class="details">
    <p>Course ID: {{ course.id }}</p>
    <p>Full details for {{ course.name }} ({{ course.code }}).</p>
  </div>

  <div class="actions">
    <button type="button" (click)="toggleExpand(); $event.stopPropagation()">
      {{ isExpanded ? 'Hide Details' : 'Show Details' }}
    </button>
    <button type="button" class="enroll" (click)="onEnroll(); $event.stopPropagation()">
      {{ isEnrolled ? 'Unenroll' : 'Enroll' }}
    </button>
  </div>
</div>
